name: Automatic Builds

on:
  push:
    branches:
    - master

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Install MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
    - name: Install build tools, wxWidgets, and PortAudio
      run: pacman -S mingw-w64-x86_64-{gcc,pkg-config,wxWidgets,portaudio,jbigkit} make --noconfirm
      shell: msys2 {0}
    - name: Compile
      run: |
        make -j$(nproc)
        strip noods.exe
      shell: msys2 {0}
      working-directory: ${{ github.workspace }}
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: noods-windows
        path: noods.exe

  build-mac:
    runs-on: macos-latest

    steps:
    - name: Install wxWidgets and PortAudio
      run: brew install wxmac portaudio
    - name: Checkout
      uses: actions/checkout@v4
    - name: Compile
      run: |
        make -j$(sysctl -n hw.logicalcpu)
        ./mac-bundle.sh --dmg
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: noods-mac
        path: NooDS.dmg

  build-linux:
    runs-on: ubuntu-latest

    steps:
    - name: Install Flatpak and SDK
      run: |
        sudo apt update
        sudo apt install flatpak flatpak-builder -y
        sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
        sudo flatpak install flathub org.freedesktop.Platform//21.08 org.freedesktop.Sdk//21.08 -y
    - name: Checkout
      uses: actions/checkout@v4
    - name: Compile
      run: |
        git config --global protocol.file.allow always
        make flatpak
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: noods-linux
        path: noods.flatpak

  build-switch:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Compile
      run: make switch -j$(nproc)
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: noods-switch
        path: noods.nro

  build-wiiu:
    runs-on: ubuntu-latest
    container: devkitpro/devkitppc:latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Compile
      run: |
        make wiiu -j$(nproc)
        mv icon/icon-wiiu.png icon.png
        mv icon/meta.xml meta.xml
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: noods-wiiu
        path: |
          icon.png
          meta.xml
          noods.rpx

  build-wii:
    runs-on: ubuntu-latest
    container: devkitpro/devkitppc:latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Compile
      run: |
        make -f Makefile.wii -j$(nproc)
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: noods-wii
        path: |
          */

  build-vita:
    runs-on: ubuntu-latest
    container: vitasdk/vitasdk:latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Compile
      run: make vita -j$(nproc)
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: noods-vita
        path: noods.vpk
